name: deploy

# S1a — chaîne UNIQUE et ORDONNÉE de mise en production (référence : deploy.yml
# fourni par Matt). Sur push/merge → main, un seul job enchaîne, en s'arrêtant à
# la première erreur : tsc → vitest → migrations Supabase → Deploy Hook Vercel.
# Conséquence voulue : un test rouge OU une migration cassée bloque le déploiement.
#
# Adaptation (autorisée par l'addendum) : une GARDE saute migration + deploy tant
# que les secrets ne sont pas posés, pour que la CI reste verte pendant la fenêtre
# où P1/P2 ne sont pas faits. tsc + vitest tournent quand même.
#
# Secrets requis (GitHub → Settings → Secrets and variables → Actions) :
#   SUPABASE_ACCESS_TOKEN · SUPABASE_DB_PASSWORD · SUPABASE_PROJECT_REF
#   VERCEL_DEPLOY_HOOK (créé côté Vercel une fois ce workflow en place)
# Prérequis Vercel : auto-deploy sur main DÉSACTIVÉ (le hook remplace), APRÈS
# le premier succès de cette chaîne.
#
# ⚠️ Bootstrap une seule fois : la base a été migrée à la main (0001→0028).
# Avant le premier db push, baseliner l'historique (supabase migration repair
# --status applied <version>) sinon db push rejoue 0001. Geste Matt, une fois.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  test-migrate-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci

      # tsc + vitest d'abord : rien ne migre ni ne déploie si ça casse.
      - name: Typecheck + tests
        run: |
          npx tsc --noEmit
          npx vitest run

      # Garde : sans secrets, on saute migration + deploy (vert). tsc/vitest ont tourné.
      - name: Garde — secrets présents ?
        id: guard
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Secrets absents — migration/déploiement sautés (vert). Poser les secrets pour activer."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.guard.outputs.present == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Migrations AVANT le déploiement. Échec ici = pas de deploy.
      - name: Apply migrations
        if: steps.guard.outputs.present == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          supabase db push --password "$SUPABASE_DB_PASSWORD"

      # Déploiement Vercel APRÈS migrations réussies.
      - name: Trigger Vercel deploy
        if: steps.guard.outputs.present == 'true'
        run: curl -sf -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
