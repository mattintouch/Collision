name: Deploy (main)

# S1a — chaîne UNIQUE et ORDONNÉE de mise en production. Sur push/merge → main,
# un seul job enchaîne, dans cet ordre, en s'arrêtant à la première erreur :
#   1. tsc (typecheck)
#   2. vitest (tests)
#   3. migrations Supabase (db push)
#   4. déclenchement du déploiement Vercel (Deploy Hook)
#
# Conséquence voulue : un test rouge OU une migration cassée bloque le déploiement.
# Le code n'atteint jamais la prod avant que sa migration soit passée.
#
# L'auto-deploy Vercel sur `main` doit être DÉSACTIVÉ pour que ce workflow soit la
# seule voie de mise en prod (sinon la course code-avant-migration revient).
#
# Secrets requis (GitHub → Settings → Secrets and variables → Actions) :
#   SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD, VERCEL_DEPLOY_HOOK
# Variable requise (non sensible, onglet Variables) :
#   SUPABASE_PROJECT_REF  (le sous-domaine de l'URL Supabase, ex. abcd1234)
#
# ⚠️ Bootstrap une seule fois : la base existante a été migrée à la main
# (0001→0027). Avant le premier `db push`, baseliner l'historique côté Supabase
# (`supabase migration repair --status applied <version>` pour 0001→0027), sinon
# `db push` tentera de rejouer 0001. Geste à faire par Matt une fois (accès DB).

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci

      # 1 + 2 — Qualité : rien ne migre ni ne déploie si ça casse.
      - name: Typecheck (tsc)
        run: npm run typecheck
      - name: Tests (vitest)
        run: npm test

      # Garde : sans secrets Supabase, on saute migration + deploy (vert), utile
      # tant que Matt n'a pas posé les secrets. La qualité (1+2) a déjà tourné.
      - name: Garde — secrets présents ?
        id: guard
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Secrets absents — migration/déploiement sautés (vert). Poser les secrets pour activer."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: supabase/setup-cli@v1
        if: steps.guard.outputs.present == 'true'
        with:
          version: latest

      # 3 — Migrations AVANT le déploiement. Échec ici = pas de deploy.
      - name: Appliquer les migrations
        if: steps.guard.outputs.present == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ vars.SUPABASE_PROJECT_REF }}"
          supabase db push

      # 4 — Déploiement Vercel APRÈS migrations réussies.
      - name: Déclencher le déploiement Vercel
        if: steps.guard.outputs.present == 'true'
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
