name: deploy

# Garde de main : tsc + vitest sur chaque push/merge → main. Un rouge ici
# signale une régression arrivée sur main malgré la CI des PR.
#
# DÉCISION ACTÉE (handoff 24/07, décision 3) : les migrations restent
# MANUELLES (registre docs/MIGRATIONS-EN-ATTENTE.md, application par Matthieu
# dans Supabase, code défensif des deux côtés). La CI ne déclenche AUCUNE
# migration automatique : l'ancienne chaîne migration + deploy hook (gardée
# par des secrets jamais posés, donc jamais exécutée) est retirée. Le
# déploiement reste l'auto-deploy Vercel sur main, comme depuis le début.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  tests-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck + tests
        run: |
          npx tsc --noEmit
          npx vitest run
